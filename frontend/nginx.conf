# Docker's embedded DNS — re-resolve service names so backend container
# restarts don't leave nginx holding stale IPs.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Long-lived caching for hashed build assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- API routing (mirrors the vite dev-server proxy table) ---
    # proxy_pass with a variable forces per-request DNS resolution.

    location /api/v1/auth {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream;
        include /etc/nginx/proxy_params.conf;
    }

    location ~ ^/api/v1/(problems|tags|submissions|playback) {
        set $problem_upstream http://problem-service:8001;
        proxy_pass $problem_upstream;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/execute {
        set $execution_upstream http://execution-service:8002;
        proxy_pass $execution_upstream;
        include /etc/nginx/proxy_params.conf;
    }

    location ~ ^/api/v1/(assessments|invitations|glass-box) {
        set $assessment_upstream http://assessment-service:8003;
        proxy_pass $assessment_upstream;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/ai {
        set $ai_upstream http://ai-service:8004;
        proxy_pass $ai_upstream;
        include /etc/nginx/proxy_params.conf;
    }

    # WebSocket streaming for real-time execution output
    location /socket.io {
        set $execution_ws_upstream http://execution-service:8002;
        proxy_pass $execution_ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
