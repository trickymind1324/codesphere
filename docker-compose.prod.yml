# CodeSphere — full-stack production-style deployment.
#
#   1. Generate JWT keys (once):   cd backend/auth-service && ./generate-keys.sh
#   2. Build sandbox runtimes:     ./scripts/build-runtime-images.sh
#   3. Bring the stack up:         docker compose -f docker-compose.prod.yml up -d --build
#   4. Run migrations + seeds:     see docs/DEPLOYMENT.md
#
# Email defaults to the bundled MailHog (web UI on :8025). For real email,
# set SMTP_HOST/SMTP_USER/SMTP_PASSWORD in the environment before `up`.

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: codesphere-postgres-auth
    environment:
      POSTGRES_DB: codesphere_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-problems:
    image: postgres:16-alpine
    container_name: codesphere-postgres-problems
    environment:
      POSTGRES_DB: codesphere_problems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-problems-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-assessments:
    image: postgres:16-alpine
    container_name: codesphere-postgres-assessments
    environment:
      POSTGRES_DB: codesphere_assessments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - postgres-assessments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codesphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: codesphere-mailhog
    ports:
      - "8025:8025" # web UI to inspect sent invitations
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: codesphere-auth
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: codesphere_auth
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EMAIL_HOST: ${SMTP_HOST:-mailhog}
      EMAIL_PORT: ${SMTP_PORT:-1025}
      EMAIL_USER: ${SMTP_USER:-}
      EMAIL_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${SMTP_FROM:-CodeSphere <noreply@codesphere.local>}
      # OAuth strategies require a clientID at boot; placeholders keep the
      # service healthy until real credentials are provided.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-configured}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/v1/auth/oauth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-not-configured}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-not-configured}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3001/api/v1/auth/oauth/github/callback}
    volumes:
      - ./backend/auth-service/keys:/app/backend/auth-service/keys:ro
    ports:
      - "3001:3001"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  problem-service:
    build:
      context: .
      dockerfile: backend/problem-service/Dockerfile
    container_name: codesphere-problems
    environment:
      NODE_ENV: production
      PORT: 8001
      API_PREFIX: /api/v1
      DB_HOST: postgres-problems
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: codesphere_problems
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      EXECUTION_SERVICE_URL: http://execution-service:8002
    volumes:
      # public key only — problem-service verifies, never signs
      - ./backend/auth-service/keys/public.pem:/app/backend/problem-service/keys/public.pem:ro
    ports:
      - "8001:8001"
    depends_on:
      postgres-problems:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  execution-service:
    build:
      context: .
      dockerfile: backend/execution-service/Dockerfile
    container_name: codesphere-execution
    environment:
      NODE_ENV: production
      PORT: 8002
      API_PREFIX: /api/v1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      DOCKER_HOST: unix:///var/run/docker.sock
      ENABLE_DOCKER: "true"
      # Must be the SAME path on host and in-container: sandbox containers
      # are siblings started via the host daemon, so bind mounts resolve
      # against the host filesystem.
      SANDBOX_TEMP_DIR: /tmp/codesphere-sandbox
      CLEANUP_TEMP_FILES: "true"
      SANDBOX_NETWORK_ENABLED: "false"
      PROBLEM_SERVICE_URL: http://problem-service:8001
      ASSESSMENT_SERVICE_URL: http://assessment-service:8003
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codesphere-sandbox:/tmp/codesphere-sandbox
      - ./backend/auth-service/keys/public.pem:/app/backend/auth-service/keys/public.pem:ro
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  assessment-service:
    build:
      context: .
      dockerfile: backend/assessment-service/Dockerfile
    container_name: codesphere-assessments
    environment:
      NODE_ENV: production
      PORT: 8003
      API_PREFIX: /api/v1
      DB_HOST: postgres-assessments
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: codesphere_assessments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PROBLEM_SERVICE_URL: http://problem-service:8001
      JWT_PUBLIC_KEY_FILE: /keys/public.pem
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-CodeSphere <noreply@codesphere.local>}
    volumes:
      - ./backend/auth-service/keys/public.pem:/keys/public.pem:ro
    ports:
      - "8003:8003"
    depends_on:
      postgres-assessments:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  ai-service:
    build:
      context: ./backend/ai-service
    container_name: codesphere-ai
    environment:
      PORT: 8004
      API_PREFIX: /api/v1
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # gemma3:4b: best instruction-following/summarization quality that fits
      # an 8GB machine; llama3.2:3b is a lighter fallback.
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8004:8004"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: codesphere-frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - problem-service
      - execution-service
      - assessment-service
      - ai-service
    restart: unless-stopped

volumes:
  postgres-auth-data:
  postgres-problems-data:
  postgres-assessments-data:
  redis-data:
